# Fonte: PostgreSQL — target dev do dbt (desenvolvimento local)
# Schema: dbt_dev_marts (gerado pelo dbt com +schema: marts, target dev)
#
# Variáveis de ambiente necessárias (ver .env.example):
#   POSTGRES_HOST, POSTGRES_PORT, POSTGRES_DB, POSTGRES_USER,
#   POSTGRES_PASSWORD, PG_MARTS_SCHEMA
#
# Para usar esta fonte nas páginas, substitua weather_dw por weather_pg
# nas queries SQL e ajuste os nomes das tabelas se necessário.
#
# Documentação: https://docs.evidence.dev/core-concepts/data-sources/#postgresql

name: weather_pg
type: postgres
host: "${POSTGRES_HOST}"
port: "${POSTGRES_PORT}"
database: "${POSTGRES_DB}"
user: "${POSTGRES_USER}"
password: "${POSTGRES_PASSWORD}"
schema: "${PG_MARTS_SCHEMA}"
